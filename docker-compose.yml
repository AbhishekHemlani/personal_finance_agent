services:
  postgres:
    image: postgres:16
    container_name: ledgerly-postgres
    environment:
      POSTGRES_USER: ledgerly
      POSTGRES_PASSWORD: ledgerly
      POSTGRES_DB: ledgerly
    ports:
      - "5433:5432"
    volumes:
      - ledgerly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerly -d ledgerly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ledgerly-postgres-data:
